# Netlify configuration for landscape2 website
# This configuration builds landscape2 from source code

[build]
  # Build command - run the build script
  command = "bash scripts/build-netlify.sh"
  # Directory to publish (the output of landscape2 build)
  publish = "build"

# Handle SPA routing - serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/wasm/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"